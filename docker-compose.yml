services:

  mqtt:
    image: eclipse-mosquitto:2
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5

  pump-data-service:
    build:
      context: ./pump-data-service
      dockerfile: ../Dockerfile.springboot
    container_name: pump-data-service
    ports:
      - "8080:8080"
    environment:
      - MQTT_BROKER=tcp://mqtt:1883
      - MQTT_TOPIC=scada/pump/data
      - MQTT_CLIENT_ID=scada-springboot
    depends_on:
      mqtt:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  pump-publisher:
    build:
      context: ./mosquitto
      dockerfile: ../Dockerfile.python
    container_name: pump-publisher
    environment:
      - MQTT_BROKER=mqtt
      - MQTT_PORT=1883
    depends_on:
      pump-data-service:
        condition: service_healthy